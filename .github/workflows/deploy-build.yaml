name: Deploy Book Preview

on:
  workflow_run:
    workflows: ["Build Book"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download book artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  #v8.0.1
        with:
          name: book-zip
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: site

      - name: Unzip book
        run: |
          unzip site/book.zip -d site

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            echo "NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy PR preview
        if: steps.pr.outputs.NUMBER != ''
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  #v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/_build/html
          destination_dir: _preview/${{ steps.pr.outputs.NUMBER }}
          keep_files: true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  #v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site/_build/html
          keep_files: true
